name: Docker Image CI - Dev (Non-Main)

on:
  push:
    branches: [ "**" ]  # Triggert für alle Branches
  pull_request:
    branches: [ "**" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Force Node.js 24 für Actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push-dev:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Benötigt für GHCR

    steps:
      - name: Checkout
        uses: actions/checkout@v4  # Bleibt v4 (unterstützt bereits Node.js 24)

      - name: Log in to GHCR (nur bei push auf Nicht-Main)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login $REGISTRY -u ${{ github.actor }} --password-stdin

      - name: Extract metadata für dev-Tags
        id: meta
        uses: docker/metadata-action@v5  # Aktualisiert auf v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch,prefix=dev-
            type=ref,event=pr,prefix=dev-pr-,suffix=-{{branch}}
            type=sha,prefix=dev-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4  # Aktualisiert auf v3

      - name: Build and push (nur bei push auf Nicht-Main)
        uses: docker/build-push-action@v5  # Aktualisiert auf v5
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
