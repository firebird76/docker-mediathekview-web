name: Docker

on:
  schedule:
    - cron: '2 20 * * *'  # Täglich um 20:02 UTC
  push:
    branches: [ "**" ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Erzwingt Node.js 24 für alle Actions (löst die Warnung)
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      # 1. Repository auschecken (mit Node.js 24)
      - name: Checkout repository
        uses: actions/checkout@v4.2.0  # Node.js 24-kompatibel

      # 2. Cosign installieren (für Image-Signaturen)
      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3.6.0
        with:
          cosign-release: 'v2.4.0'

      # 3. Docker Buildx einrichten (Multi-Architektur)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.5.0  # Node.js 24-kompatibel

      # 4. Registry-Anmeldung (nur für Nicht-PR-Events)
      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3.3.0  # Node.js 24-kompatibel
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 5. Docker-Metadaten extrahieren (Tags & Labels)
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5.8.0  # Node.js 24-kompatibel
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=edge,branch=main
            type=raw,value=dev,enable=${{ github.ref != 'refs/heads/main' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short

      # 6. Docker-Image bauen und pushen
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6.7.0  # NEUESTE VERSION (Node.js 24)
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # Wichtig: Separate RUN-Befehle für bessere Fehlerbehebung
          provenance: true
          sbom: true
